block.shield-projector.description = Protects structures within its radius from any threats. Requires substantial resources to build.
block.large-shield-projector.description = Protects structures within its radius from any threats. Requires substantial resources to build.
block.thruster.description = Protects structures from enemy projectiles. Data indicates this was once an advanced engine, now only its form remains.
block.heat-reactor.description = Produces heat from thorium and nitrogen. Generates fissile matter as a byproduct.
block.slag-centrifuge.description = Centrifuges slag and sand into gallium.
item.fissile-matter.description = Used in radioactive elements and quantum technologies.
item.dormant-cyst.description = Used to reinforce and protect neoplasmic structures.
liquid.gallium.description = Used in lighting and reflective structures. Can also be used as a coolant.
unit.manifold.description = A cargo drone designed for rapid transport of large quantities of resources from one point to another.
unit.assembly-drone.description = A unique drone that assembles units on specific blocks.
unit.scathe-missile.name = Carbide missile
unit.scathe-missile.description = A ballistic missile highly effective at destroying groups of ground units. Can be shot down before impact.
unit.scathe-missile-phase.name = Phase missile
unit.scathe-missile-phase.description = A ballistic missile highly effective at destroying groups of ground units. Has a non-replenishing shield that protects the missile. Can be shot down before impact.
unit.scathe-missile-surge.name = Surge missile
unit.scathe-missile-surge.description = A ballistic missile highly effective at destroying groups of ground units. Splits into 5 separate missiles after a short time. Can be shot down before impact.
unit.scathe-missile-surge-split.name = Surge fragment missile
unit.scathe-missile-surge-split.description = A fragment missile with weaker characteristics than a standard missile. Can be shot down before impact.
unit.anthicus-missile.name = Anthicus missile
unit.anthicus-missile.description = A homing missile that can be shot down before impact.
unit.quell-missile.name = Quell missile
unit.quell-missile.description = A homing missile that can be shot down before impact.
unit.disrupt-missile.name = Disrupt missile
unit.disrupt-missile.description = A powerful homing missile that can be shot down before impact. Suppresses enemy repair buildings.
unit.renale.description = A basic neoplasmic unit. Deals damage by crawling over enemy blocks.
unit.latum.description = An advanced neoplasmic unit. Deals damage by crawling over enemy blocks. Upon death, releases 5 Renale units.
weather.snowing.description = Low temperatures cause water droplets to freeze and fall as snow.
weather.rain.description = Precipitation caused by a high concentration of water vapor in the troposphere.
weather.sandstorm.description = In desert regions, strong winds lift sand to create storms.
weather.sporestorm.description = In spore-infested regions, wind picks up spore particles, creating storms.
weather.fog.description = Caused by a high concentration of water vapor in the atmosphere; can greatly reduce visibility.
weather.suspend-particles.name = Suspend particles
weather.suspend-particles.description = An atmospheric phenomenon on [accent]Tantros[]. Has no effect on gameplay.