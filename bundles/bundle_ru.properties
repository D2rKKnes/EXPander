block.shield-projector.description = Защищает строения в радиусе от любых угроз. Требует внушительных затрат для строительства.
block.large-shield-projector.description = Защищает строения в радиусе от любых угроз. Требует внушительных затрат для строительства.
block.thruster.description = Защищает постройки от вражеских снарядов. Данные показывают что раньше это был продвинутый двигатель, от которого осталась только форма.
block.heat-reactor.description = Производит тепло из тория и азота. Производит нестабильную материю в качестве побочного продукта.
block.slag-centrifuge.description = Центрифугирует шлак и песок в галлий.
item.fissile-matter.description = Используется в радиоактивных элементах и квантовых технологиях.
item.dormant-cyst.description = Используется в укреплении и защите неоплазменных строений.
liquid.gallium.description = Используется в осветительных и отражающих конструкциях. Также может использоватся как охладительный элемент.
unit.manifold.description = Грузовой дрон, предназначенный для быстрой перевозки большого количества ресурсов из одной точки в другую.
unit.assembly-drone.description = Уникальный дрон, собирающий единицы на специальных блоках.
unit.scathe-missile.name = Карбидовая ракета
unit.scathe-missile.description = Баллистическая ракета, способная с большой эффективностью уничтожать группы наземных единиц. Можно сбить до попадания.
unit.scathe-missile-phase.name = Фазовая ракета
unit.scathe-missile-phase.description = Баллистическая ракета, способная с большой эффективностью уничтожать группы наземных единиц. Имеет невосстанавливаемый щит, защищающий ракету. Можно сбить до попадания.
unit.scathe-missile-surge.name = Кинетическая ракета
unit.scathe-missile-surge.description = Баллистическая ракета, способная с большой эффективностью уничтожать группы наземных единиц. Разделяется на 5 отдельных ракет после некоторого времени. Можно сбить до попадания.
unit.scathe-missile-surge-split.name = Осколочная кинетическая ракета
unit.scathe-missile-surge-split.description = Осколочная ракета, имеющая более слабые характеристики, чем у обычной ракеты. Можно сбить до попадания.
unit.anthicus-missile.name = Ракета Антикуса
unit.anthicus-missile.description = Самонаводящаяся ракета, которую можно сбить до попадания.
unit.quell-missile.name = Ракета Подавления
unit.quell-missile.description = Самонаводящаяся ракета, которую можно сбить до попадания.
unit.disrupt-missile.name = Ракета Разрушения
unit.disrupt-missile.description = Самонаводящаяся ракета, которую можно сбить до попадания. Подавляет вражеские ремонтирующие постройки.
unit.renale.description = Базовая неоплазменная единица. Наносит урон, ползая по вражеским блокам. Регенерирует, поглощая неоплазму.
unit.latum.description = Продвинутая неоплазменная единица. Наносит урон, ползая по вражеским блокам. Регенерирует, поглощая неоплазму. После смерти высвобождает из себя 5 Ренале.
weather.snowing.description = При низких температурах капли воды замерзают и выпадают в виде снега.
weather.rain.description = Осадки, возникающие из-за высокой концентрации водяного пара в тропосфере.
weather.sandstorm.description = Сильный ветер в пустынных регионах поднимает массы песка, создавая бури.
weather.sporestorm.description = Ветер подхватывает частицы спор в заражённых районах, формируя споровые бури.
weather.fog.description = Плотный водяной пар в атмосфере, значительно ухудшающий видимость.
weather.suspend-particles.name = Взвешенные частицы
weather.suspend-particles.description = Атмосферное явление на [accent]Тантросе[]. Носит декоративный характер.